<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>عرض تبويبات المدير — الراتب + الإيرادات والحضور</title>
  <link rel="stylesheet" href="src/styles/main.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
  <style>
    body { overflow: auto; }
    .demo-banner {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      padding: 14px 24px;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
    }
    .demo-banner small { font-weight: 400; opacity: .85; display: block; margin-top: 4px; }
    .demo-wrap { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }
    .demo-tabs { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
    .demo-tab {
      padding: 10px 18px;
      border-radius: 10px;
      background: white;
      border: 1px solid #e2e8f0;
      color: #64748b;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .demo-tab.active {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 16px -4px rgba(99,102,241,.5);
    }
  </style>
</head>
<body>

  <div class="demo-banner">
    تاب «الإيرادات والحضور» — شهور قابلة للاختيار من أبريل + تصميم أنضف
    <small>تم حذف «إدخال حضور يدوي» و«سجل الحضور» وحذف تاب «الخصومات والمكافآت». اضغط على شهر لاستعراض بياناته.</small>
  </div>

  <div class="demo-wrap">
    <div class="page-header">
      <div>
        <div class="flex-row mb-2" style="display:flex;align-items:center;gap:8px;">
          <button class="btn btn-secondary btn-sm">→ رجوع</button>
          <div class="page-title" style="margin-right:8px;">أحمد محمود</div>
        </div>
        <div class="page-subtitle">صيدلي</div>
      </div>
    </div>

    <div class="demo-tabs" id="demoTabs">
      <button class="demo-tab" data-tab="messages">الرسائل</button>
      <button class="demo-tab" data-tab="cleaning">التنظيف الشهري</button>
      <button class="demo-tab active" data-tab="revenue">الإيرادات والحضور</button>
      <button class="demo-tab" data-tab="policies">السياسات</button>
      <button class="demo-tab" data-tab="salary">الراتب</button>
    </div>

    <div id="tabRoot"></div>
  </div>

  <!-- Toast + Modal containers required by utils.js -->
  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Real utils.js (window.U) -->
  <script src="src/js/utils.js"></script>

  <!-- In-memory stub for window.API used by salary.js + revenue.js -->
  <script>
    (function () {
      const today = new Date();
      const curYm = today.toISOString().slice(0,7);
      const attendance = [];
      for (let d = 1; d <= 22; d++) {
        const day = String(d).padStart(2,'0');
        attendance.push({
          id: d, date: `${curYm}-${day}`, shift: (d % 2) + 1,
          check_in: `${curYm}-${day}T09:00:00`, check_out: `${curYm}-${day}T17:00:00`,
          source: 'self', notes: ''
        });
      }
      // Revenues across multiple months — current month plus a previous month
      // so the screenshot shows that each month is isolated.
      const revenues = [
        { id: 1, date: `${curYm}-02`, amount: 1500, notes: 'بيع نقدي' },
        { id: 2, date: `${curYm}-07`, amount: 980,  notes: '' },
        { id: 3, date: `${curYm}-14`, amount: 2450, notes: 'وصفات تأمين' },
        { id: 4, date: `${curYm}-21`, amount: 1320, notes: '' },
        { id: 5, date: `${curYm}-28`, amount: 870,  notes: 'بيع جزئي' }
      ];
      let nextId = 6;
      // In-memory store for per-month incentive bases and targets
      const _settings = {};
      window.API = {
        'salary:summary': async () => ({
          hours: 176, bonuses: 350, deductions: 80, advances: 500, net: 4520
        }),
        'attendance:listByEmployee': async () => attendance.slice(),
        'revenues:listByEmployee':   async () => revenues.slice(),
        'revenues:create': async ({ amount, date, notes }) => {
          revenues.unshift({ id: nextId++, amount: Number(amount), date, notes });
        },
        'revenues:delete': async ({ id }) => {
          const i = revenues.findIndex(r => r.id === id);
          if (i >= 0) revenues.splice(i, 1);
        },
        'attendance:managerEntry': async (row) => { console.log('attendance:managerEntry', row); },
        // settings stubs
        'settings:setKey': async ({ key, value }) => { _settings[key] = Number(value) || 0; return { ok: true }; },
        'settings:getKey': async ({ key }) => ({ key, value: _settings[key] || 0 }),
        'settings:getMonthBases': async () => {
          const map = {};
          Object.entries(_settings).forEach(([k, v]) => { if (k.startsWith('incentive_base:')) map[k.replace('incentive_base:', '')] = v; });
          return map;
        },
        // employees:update stub
        'employees:update': async (data) => { console.log('employees:update', data); return { ok: true }; }
      };
    })();
  </script>

  <!-- Real tab modules from the Electron app -->
  <script src="src/js/manager/tabs/salary.js"></script>
  <script src="src/js/manager/tabs/revenue.js"></script>
  <script src="src/js/manager/tabs/messages.js"></script>
  <script src="src/js/manager/tabs/cleaning.js"></script>
  <script src="src/js/manager/tabs/policies.js"></script>

  <!-- Shared month strip + tab switcher -->
  <script>
    (function () {
      const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
      function ymKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
      function buildMonthList() {
        const today = new Date();
        const fyStartYear = today.getMonth() >= 3 ? today.getFullYear() : today.getFullYear() - 1;
        const list = [];
        for (let i = 0; i < 12; i++) {
          const m = (3 + i) % 12;
          const y = fyStartYear + Math.floor((3 + i) / 12);
          list.push({ ym: ymKey(y, m), label: AR_MONTHS[m] + ' ' + y });
        }
        const todayYm = ymKey(today.getFullYear(), today.getMonth());
        list.forEach(it => { it.future = it.ym > todayYm; });
        return { list, defaultYm: todayYm };
      }
      function fmtToday() {
        return new Date().toLocaleDateString('ar-EG', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      }

      const employee = { id: 1, name: 'أحمد محمود', role: 'صيدلي', hourly_rate: 25, incentive_percentage: 0.1 };
      const tabRoot = document.getElementById('tabRoot');
      const tabsBar = document.getElementById('demoTabs');
      const { list: months, defaultYm } = buildMonthList();
      let selectedYm = defaultYm;
      let activeTab  = new URLSearchParams(location.search).get('tab') || 'revenue';

      /* ── Today badge (inserted into .demo-wrap before the tab bar) ── */
      const demoWrap = document.querySelector('.demo-wrap');
      const todayBadge = document.createElement('div');
      todayBadge.className = 'today-badge';
      todayBadge.style.cssText = 'margin-bottom:14px;justify-content:flex-end;';
      const todaySpan = document.createElement('span'); todaySpan.className = 'today-text';
      todaySpan.textContent = fmtToday();
      todayBadge.innerHTML = '<span class="today-icon">📅</span>';
      todayBadge.appendChild(todaySpan);
      demoWrap.insertBefore(todayBadge, demoWrap.querySelector('.demo-tabs'));
      setInterval(() => { todaySpan.textContent = fmtToday(); }, 60000);

      /* ── Month strip ── */
      const stripWrap = document.createElement('div'); stripWrap.className = 'month-strip-wrap';
      const strip = document.createElement('div'); strip.className = 'month-strip';
      stripWrap.appendChild(strip);
      demoWrap.insertBefore(stripWrap, demoWrap.querySelector('.demo-tabs'));

      function renderStrip() {
        strip.innerHTML = '';
        months.forEach(m => {
          const chip = document.createElement('button');
          chip.className = 'month-chip' + (m.ym === selectedYm ? ' active' : '') + (m.future ? ' future' : '');
          chip.textContent = m.label;
          chip.onclick = () => { if (m.future) return; selectedYm = m.ym; renderStrip(); showTab(activeTab); };
          strip.appendChild(chip);
        });
      }

      /* ── Tab switcher ── */
      function showTab(name) {
        activeTab = name;
        [...tabsBar.children].forEach(b => b.classList.toggle('active', b.dataset.tab === name));
        tabRoot.innerHTML = '';
        const ctx = { employee, selectedYm };
        if (name === 'revenue')  return window.MgrTabRevenue.render(tabRoot, ctx);
        if (name === 'salary')   return window.MgrTabSalary.render(tabRoot, ctx);
        if (name === 'messages') return window.MgrTabMessages.render(tabRoot, ctx);
        if (name === 'cleaning') return window.MgrTabCleaning.render(tabRoot, ctx);
        if (name === 'policies') return window.MgrTabPolicies.render(tabRoot, ctx);
        tabRoot.innerHTML = '<div class="card"><div class="card-title">— تبويب غير مفعّل في العرض التوضيحي —</div></div>';
      }

      tabsBar.addEventListener('click', (e) => {
        const btn = e.target.closest('.demo-tab');
        if (btn) showTab(btn.dataset.tab);
      });

      renderStrip();
      showTab(activeTab);
    })();
  </script>

</body>
</html>
